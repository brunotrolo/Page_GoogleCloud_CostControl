name: WhatsApp MCP Health

# Verifica 1x por dia se o canal de WhatsApp está no ar E com a sessão conectada.
# Se o /health não responder OU "online" não for true (VM caída ou WhatsApp deslogado),
# o job FALHA — e o GitHub notifica o dono do repositório por e-mail (Settings →
# Notifications → Actions com e-mail ligado). É o "quem vigia o vigia": externo à VM,
# pega inclusive o caso da sessão deslogada (VM no ar, mas WhatsApp caído).
on:
  schedule:
    - cron: '0 12 * * *'   # todo dia às 12:00 UTC (~09:00 BRT)
  workflow_dispatch:        # permite disparar manualmente em Actions

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Checar /health do WhatsApp MCP
        run: |
          URL="https://34.139.120.158.sslip.io/health"
          echo "Checando $URL ..."
          RESP=$(curl -s --max-time 25 "$URL" || echo '{"erro":"sem resposta (VM fora do ar?)"}')
          echo "Resposta: $RESP"
          if echo "$RESP" | grep -q '"online":true'; then
            echo "✅ Canal online e conectado."
          else
            echo "::error::WhatsApp MCP indisponível ou sessão deslogada. Resposta: $RESP"
            echo "Ação: SSH na VM → journalctl -u whatsapp-mcp; se deslogado, re-parear via QR (ver docs/whatsapp-mcp-monitoramento.md)."
            exit 1
          fi
